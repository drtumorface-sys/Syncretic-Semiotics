nings, purification"}}, {"id": "042", "name": "Box Jellyfish", "latinName": "Chironex fleckeri", "classification": "Real", "tradition": "Both", "origin": "Endemic", "animalType": "Marine", "regions": ["Australia - First Nations", "Northern Australia", "Queensland"], "image": "https://source.unsplash.com/featured/400x400/?box+jellyfish+ocean", "coreMeaning": "The Box Jellyfish is the invisible killer of tropical Australian waters \u2014 nearly transparent, trailing tentacles up to 3 metres long, carrying enough venom to kill a human in minutes. It is the omen of invisible, systemic danger: the threat you cannot see in water that looks perfectly safe.", "semioticReasoning": "The Box Jellyfish's semiotic power is its transparency. Unlike the shark (which at least has a fin, a silhouette, a visible form to fear), the Box Jellyfish is functionally invisible in its medium. You cannot see it, you cannot avoid it through vigilance, and contact is fatal. This makes it the perfect signifier for dangers that are embedded in the system itself \u2014 not predators that hunt you but hazards that exist passively in the environment. The 'stinger season' (October to May in tropical Australia) creates a temporal omen-frame: there are months when the ocean is simply off-limits. This seasonal prohibition echoes First Nations concepts of country that is closed or restricted \u2014 places and times when the land (or sea) itself is dangerous, regardless of individual skill or caution.", "positiveOmens": ["Awareness of stinger season and acting accordingly: respecting invisible dangers is wisdom, not cowardice.", "Stinger nets and vinegar stations on beaches: the community has organised to protect against the invisible.", "Box Jellyfish in their deep-water habitat, not encountered: the danger exists but at safe distance."], "negativeOmens": ["Box Jellyfish in swimming waters: invisible, lethal danger is present in what appears safe.", "Entering tropical waters during stinger season without protection: wilful blindness to known danger.", "A sting: the invisible has made contact. The consequence is immediate and severe.", "Climate change extending stinger season further south: the zone of invisible danger is expanding."], "contextualModifiers": ["Season is everything: October-May in tropical waters = maximum danger. This creates a binary world \u2014 safe months and dangerous months.", "Transparency = the core signifier. The danger you can see (shark, crocodile) can be avoided. The danger you cannot see (jellyfish) requires systemic protection.", "The Irukandji (Carukia barnesi) \u2014 a related jellyfish the size of a fingernail that can cause lethal 'Irukandji syndrome' \u2014 pushes the invisible-threat signifier to its extreme.", "Tropical beach closures during stinger season encode the concept that paradise has a seasonal dark side."], "culturalContext": "Box Jellyfish are responsible for more deaths in Australia than sharks, crocodiles, and snakes combined. Yet they receive a fraction of the media and cultural attention, precisely because they are invisible and therefore uncinematic. This attention deficit is itself a semiotic lesson: the most dangerous thing is not the most feared thing; the most feared thing is the most visible thing.", "syncreticLinks": [{"culture": "Japanese", "note": "The concept of 'mu' (emptiness/nothingness) as a potent force resonates with a lethal organism that is essentially invisible."}, {"culture": "Greek (Ancient)", "note": "Medusa's gaze that turns the viewer to stone shares the 'contact with the unseen = death' archetype, though Medusa is at least visible."}, {"culture": "Hindu (India)", "note": "Maya (cosmic illusion) \u2014 the idea that the visible world conceals the real one \u2014 parallels the jellyfish in the clear water."}], "alt": "[042] Box Jellyfish (Chironex fleckeri) - Endemic Australian marine in First Nations and settler omen traditions", "ogham": {"letter": "Iodhadh", "char": "\u1694", "tree": "Yew", "aicme": "Ailme", "quality": "Death, rebirth, eternity"}}, {"id": "043", "name": "Blue-ringed Octopus", "latinName": "Hapalochlaena spp.", "classification": "Real", "tradition": "Settler", "origin": "Endemic", "animalType": "Marine", "regions": ["Australia"], "image": "https://source.unsplash.com/featured/400x400/?blue+ringed+octopus", "coreMeaning": "The Blue-ringed Octopus is the beautiful killer \u2014 a tiny, exquisitely patterned creature whose iridescent blue rings flash as a warning display, carrying enough tetrodotoxin to kill 26 adults in minutes with no known antivenom. It is the omen of beauty that kills: the attractive surface concealing lethal consequence.", "semioticReasoning": "The Blue-ringed Octopus inverts the normal predator-prey signifier relationship. Most dangerous animals in Australia are camouflaged (brown snake, stonefish, box jellyfish) \u2014 they hide their danger. The Blue-ringed Octopus DISPLAYS its danger with extraordinary beauty. The flashing blue rings are aposematic colouration \u2014 a warning that says 'I am lethal, do not touch.' This makes it the rare animal that tells you exactly what it is: the sign and the danger are the same thing. Yet people still pick them up, attracted by the beauty. The Blue-ringed Octopus is thus the supreme signifier for warnings that are ignored because they are beautiful \u2014 the seductive danger, the truth that is visible but dismissed because it doesn't look like a threat.", "positiveOmens": ["Seeing the blue rings flash and stepping back: the warning system works. You received the message and respected it.", "A Blue-ringed Octopus in a rock pool, undisturbed: lethal beauty exists in nature; admire from distance.", "Awareness that the most beautiful creature in the rock pool is the most dangerous: beauty and danger are not opposites."], "negativeOmens": ["Picking up a Blue-ringed Octopus (disturbingly common in social media posts): the warning was displayed and ignored. Beauty overrode survival instinct.", "Blue rings flashing at maximum intensity: final warning. The creature is stressed and about to deploy its only defence.", "Envenomation: the beautiful warning was ignored; the consequence is immediate, paralytic, and potentially fatal."], "contextualModifiers": ["Size is a critical modifier: the Blue-ringed Octopus is tiny (12-20cm including arms). The most lethal thing in the rock pool is also the smallest.", "The blue rings only flash when the animal is disturbed \u2014 at rest, it is camouflaged brown/yellow. The warning is activated, not permanent.", "Tetrodotoxin (the same toxin as in puffer fish) causes paralysis while the victim remains conscious \u2014 a uniquely horrifying envenomation.", "Rock pools are coded as 'safe' spaces in Australian beach culture (especially for children), making the Blue-ringed Octopus's habitat a violation of assumed safety."], "culturalContext": "The Blue-ringed Octopus is one of Australia's most recognisable 'everything in Australia is trying to kill you' emblems. Social media posts of tourists holding Blue-ringed Octopuses go viral regularly, each one a public performance of the beauty-overriding-warning dynamic the animal semiotically encodes.", "syncreticLinks": [{"culture": "Greek (Ancient)", "note": "The Sirens whose beautiful song lured sailors to death share the 'lethal beauty' archetype exactly."}, {"culture": "Biblical", "note": "The fruit of the Tree of Knowledge \u2014 beautiful, desirable, and fatal to touch \u2014 parallels the Blue-ringed Octopus in the rock pool."}, {"culture": "Japanese (Fugu)", "note": "The puffer fish (same toxin) as a delicacy that kills if prepared incorrectly shares the beauty/danger/attraction paradox."}], "alt": "[043] Blue-ringed Octopus (Hapalochlaena spp.) - Endemic Australian marine in Settler omen traditions", "ogham": {"letter": "Ceirt", "char": "\u168a", "tree": "Apple", "aicme": "h\u00daatha", "quality": "Beauty, abundance, choice"}}, {"id": "044", "name": "Sydney Funnel-web Spider", "latinName": "Atrax robustus", "classification": "Real", "tradition": "Settler", "origin": "Endemic", "animalType": "Arachnid", "regions": ["Australia", "New South Wales"], "image": "https://source.unsplash.com/featured/400x400/?funnel+web+spider", "coreMeaning": "The Sydney Funnel-web is the spider that lives in Australia's largest city \u2014 a large, aggressive, lethally venomous arachnid found in suburban backyards, garages, and swimming pools across the Sydney basin. It is the omen of danger embedded in domesticity: the lethal wild creature in the most civilised possible setting.", "semioticReasoning": "The Funnel-web's semiotic power is geographic specificity: it is named after Sydney, Australia's most populous city. This fuses the spider with the city itself \u2014 Sydney is the place where the world's most dangerous spider lives in your garden. The Funnel-web's behaviour amplifies this: the male wanders in summer (especially after rain), entering houses, falling into pools, and hiding in shoes and clothing. It does not retreat when confronted but rears up in a threat display, fangs dripping venom. This aggression \u2014 the spider that comes TO you and stands its ground \u2014 makes it the signifier for the Australian bush's refusal to be domesticated. You can build your suburb, your pool, your garden \u2014 and the Funnel-web will be in it, waiting. The development of an antivenom in 1981 (no deaths since) adds a redemption layer: human science can neutralise the domestic threat, but the spider remains.", "positiveOmens": ["Awareness that the Funnel-web exists in your environment: respect for the wild embedded in the domestic.", "Antivenom existence: the problem has been solved by collective human effort (the antivenom program relies on public spider donations to Australian Reptile Park).", "Funnel-web in its burrow, undisturbed: the spider in its proper place, doing its ecological work."], "negativeOmens": ["Male Funnel-web found inside a home: the wild has penetrated the domestic. The boundary you thought existed does not.", "Funnel-web in a shoe or clothing: danger embedded in the most intimate, daily routine. Check before you assume safety.", "Funnel-web in a swimming pool (they can survive underwater for hours): even your leisure space is not exempt from the wild.", "Funnel-web rearing in threat display: the bush is not retreating. It stands its ground."], "contextualModifiers": ["Season: summer, especially after rain, is peak wandering season for males \u2014 the danger is calendrical.", "The Funnel-web's venom is more dangerous to primates (including humans) than to most other animals \u2014 an evolutionary coincidence that reads, semiotically, as if the spider were specifically designed to kill us.", "Geography: the Sydney basin and Blue Mountains are the epicentre. Moving north or south reduces the risk. The spider IS Sydney's shadow.", "Community antivenom donation programs (people catch Funnel-webs and deliver them to the Australian Reptile Park for milking) = collective action against the domestic threat."], "culturalContext": "The Sydney Funnel-web is a foundational element of Sydney's self-image: the most beautiful harbour city in the world, where the most dangerous spider in the world lives in your backyard. No deaths have occurred since antivenom development in 1981, but the spider's cultural presence remains enormous \u2014 it is included in virtually every 'dangerous Australia' narrative and is one of the first animals mentioned to incoming tourists.", "syncreticLinks": [{"culture": "West African (Anansi)", "note": "The spider as a powerful, cunning being shares the archetype, though Anansi is a trickster-creator while the Funnel-web is pure threat."}, {"culture": "Greek (Ancient)", "note": "Arachne (transformed into a spider for challenging the gods) shares the spider-as-consequence-of-hubris theme."}, {"culture": "European (medieval)", "note": "The spider as a symbol of patience and entrapment parallels the Funnel-web's ambush-predator strategy."}], "alt": "[044] Sydney Funnel-web Spider (Atrax robustus) - Endemic Australian arachnid in Settler omen traditions", "ogham": {"letter": "Uath", "char": "\u1686", "tree": "Hawthorn", "aicme": "h\u00daatha", "quality": "Boundaries, danger, cleansing"}}, {"id": "045", "name": "Redback Spider", "latinName": "Latrodectus hasselti", "classification": "Real", "tradition": "Settler", "origin": "Endemic", "animalType": "Arachnid", "regions": ["Australia"], "image": "https://source.unsplash.com/featured/400x400/?redback+spider+web", "coreMeaning": "The Redback Spider is the most quintessentially Australian venomous creature \u2014 found in every state and territory, in every environment from outback to inner city, living under toilet seats, in letterboxes, sheds, and shoes. If the Funnel-web is Sydney's spider, the Redback is the entire continent's. It is the omen of ubiquitous, low-level danger: not catastrophic but everywhere, always, inescapable.", "semioticReasoning": "The Redback's semiotic power is its ubiquity. There is no place in Australia where you can be confident a Redback is not within a few metres of you. Under the rim of the outdoor toilet, behind the meter box, in the pot plant, under the barbecue lid. This omnipresence makes the Redback the ambient threat \u2014 the background radiation of Australian danger. Unlike the Funnel-web (dramatic, aggressive, geographically limited) or the Brown Snake (seasonally active, habitat-specific), the Redback is always there, always small enough to overlook, always in the places where you put your unprotected hands. The female's iconic red stripe on black is one of the most recognised warning patterns in Australian culture \u2014 the flag of domestic danger. The famous folk song 'Redback on the Toilet Seat' (Slim Newton, 1972) cemented the Redback as the working-class Australian's daily hazard, encoding the spider into the national identity at the most intimate level: the dunny.", "positiveOmens": ["Checking under the toilet seat, behind the letterbox, before putting on boots: habitual caution is wisdom. The Redback teaches vigilance as a way of life.", "A Redback in its web, clearly visible: the danger is identifiable and avoidable. Knowledge is protection.", "Antivenom availability (developed 1956): the continent's most common envenomation has been survivable for 70 years."], "negativeOmens": ["Redback bite (painful, debilitating, rarely fatal): the omnipresent danger has made contact. You were not vigilant enough in that one moment.", "Redback in a child's toy or play equipment: the danger has entered the space of innocence.", "Redback webs proliferating in a neglected structure: wherever humans stop paying attention, the wild reasserts itself."], "contextualModifiers": ["The Redback is a relative of the Black Widow (North America) and Katipo (New Zealand) \u2014 the genus Latrodectus is a global signifier of small, lethal feminine danger (the female is dangerous; the male is harmless and often eaten after mating).", "Sexual cannibalism: the female eating the male after mating is one of the most culturally potent facts about the species, encoding gender-danger anxieties.", "Urban vs. rural: equally dangerous everywhere, but the cultural weight differs \u2014 rural Redback = 'part of bush life.' Urban Redback = 'the bush in the city.'", "'Redback on the Toilet Seat' (1972) is one of Australian country music's most enduring songs \u2014 the spider enshrined in folk art."], "culturalContext": "The Redback is arguably Australia's national spider \u2014 more culturally embedded than the Funnel-web because it is everywhere, not just in Sydney. It appears in songs, jokes, beer brands, and the universal Australian ritual of checking the outdoor toilet before sitting down. No other country has a spider so deeply woven into the daily fabric of domestic life.", "syncreticLinks": [{"culture": "North American (Black Widow)", "note": "Same genus, same semiotic coding: small, female, beautiful, lethal. The Black Widow carries additional noir/femme-fatale cultural weight."}, {"culture": "Japanese (Jor\u014dgumo)", "note": "The spider-woman who seduces and devours men shares the feminine-spider-as-lethal-seductress archetype."}, {"culture": "West African (Anansi)", "note": "Anansi as the small creature whose power vastly exceeds its size parallels the Redback's disproportionate cultural impact."}], "alt": "[045] Redback Spider (Latrodectus hasselti) - Endemic Australian arachnid in Settler omen traditions", "ogham": {"letter": "Gort", "char": "\u168c", "tree": "Ivy", "aicme": "Muine", "quality": "Tenacity, persistence, spiral"}}, {"id": "046", "name": "Barramundi", "latinName": "Lates calcarifer", "classification": "Real", "tradition": "First Nations", "origin": "Endemic", "animalType": "Fish", "regions": ["Australia - First Nations", "Northern Australia", "Queensland"], "image": "https://source.unsplash.com/featured/400x400/?barramundi+fish", "coreMeaning": "The Barramundi is northern Australia's totemic fish \u2014 a Dreaming ancestor in many Top End and Cape York nations, a protohermaphrodite (born male, becoming female with age), and the most culturally significant freshwater/estuarine fish on the continent. It embodies transformation, seasonal abundance, and the deep connection between waterways and community sustenance.", "semioticReasoning": "The Barramundi's protohermaphroditism \u2014 all individuals are born male and transition to female as they mature \u2014 provides an extraordinary natural signifier for transformation as a fundamental life process, not an aberration. In many First Nations traditions this biological fact is woven into narratives about change, growth, and the fluid nature of identity. The Barramundi's life cycle connects fresh water, estuarine water, and salt water (it spawns in estuaries, juveniles grow in freshwater, adults move between systems), making it a being that bridges all water-types \u2014 a living connector of Country's hydrological systems. As a food source, the Barramundi holds a similar position in northern Australia to the Kangaroo in the south: the animal whose abundance signals right relationship with Country.", "positiveOmens": ["Barramundi running (seasonal movement into accessible waters): abundance is arriving; the water-Country is providing.", "A large Barramundi caught: a mature female \u2014 the system has produced its fullest expression of growth and transformation.", "Barramundi in healthy waterway: the entire hydrological system (fresh, estuarine, salt) is connected and functioning.", "Barramundi in Dreaming narrative: transformation is natural, necessary, and part of the Law."], "negativeOmens": ["Barramundi absent from traditional waters: the waterway system is broken; upstream or downstream interference has severed the connection.", "Barramundi kill (fish die-off from pollution, low oxygen, or dam effects): the water-Country is poisoned.", "Overfishing of Barramundi: taking more than the Country offers; the reciprocal relationship has been violated.", "Dams blocking Barramundi migration: human infrastructure severing the fish's ability to complete its life cycle \u2014 the connector has been disconnected."], "contextualModifiers": ["Season: the Barramundi 'run' (wet-season movement) is a calendrical event in northern Australia.", "Size = age = sex: small Barra = young male. Large Barra = older female. The biggest fish in the waterway has undergone the most transformation.", "Commercial vs. traditional fishing: recreational Barramundi fishing is a major industry in northern Australia, creating tension between economic and cultural values.", "The Barramundi's protohermaphroditism is one of the most powerful natural demonstrations that biological sex is not binary or fixed \u2014 a fact encoded in Dreaming narratives long before Western science described it."], "culturalContext": "Barramundi Dreaming stories are among the most important narrative cycles in many Top End nations. The fish's annual movements dictate ceremonial calendars, fishing seasons, and community gathering patterns. Recreational Barramundi fishing is also one of northern Australia's largest tourism industries, creating a dual cultural framework (Indigenous sacred fish / settler trophy catch) that occasionally conflicts.", "syncreticLinks": [{"culture": "Pacific Northwest First Nations", "note": "Salmon as the totemic fish whose annual return sustains community \u2014 almost identical structural role to the Barramundi in its ecology."}, {"culture": "Japanese", "note": "The Koi (carp) transforming into a dragon by swimming upstream parallels the Barramundi's transformation narrative."}, {"culture": "Celtic (Ireland)", "note": "The Salmon of Knowledge in Fenian mythology \u2014 the fish that embodies wisdom gained through transformation."}], "alt": "[046] Barramundi (Lates calcarifer) - Endemic Australian fish in First Nations omen traditions", "ogham": {"letter": "Ruis", "char": "\u168f", "tree": "Elder", "aicme": "Muine", "quality": "Endings, transformation, rebirth"}}, {"id": "047", "name": "Dugong", "latinName": "Dugong dugon", "classification": "Real", "tradition": "First Nations", "origin": "Endemic", "animalType": "Marine", "regions": ["Australia - First Nations", "Northern Australia", "Queensland"], "image": "https://source.unsplash.com/featured/400x400/?dugong+seagrass+ocean", "coreMeaning": "The Dugong is the gentle sea-ancestor of Australia's tropical waters \u2014 a large marine herbivore whose presence indicates healthy seagrass meadows, and whose Dreaming tracks connect coastal communities across thousands of kilometres of northern coastline. It is the marine equivalent of the Kangaroo: the great provider-ancestor whose abundance signals right relationship with sea-Country.", "semioticReasoning": "The Dugong's semiotic function is marine stewardship made visible. Dugongs eat only seagrass, and seagrass meadows exist only in healthy, clear, shallow tropical waters. The Dugong's presence is therefore a living certificate of marine environmental health \u2014 if Dugongs are feeding, the water is clean, the seagrass is growing, and the coastal ecosystem is intact. Their absence signals the reverse. In Torres Strait Islander and many coastal Aboriginal traditions, the Dugong is an ancestral being whose hunting is governed by strict protocols \u2014 who may hunt, when, where, and how much. These protocols constitute one of the oldest continuously practised marine management systems on Earth, predating Western marine conservation by tens of thousands of years.", "positiveOmens": ["Dugong seen feeding in seagrass meadow: the sea-Country is healthy; the marine ecosystem is intact.", "Dugong with calf: the population is reproducing; the next generation of sea-ancestors is being raised.", "Dugong hunting conducted under traditional Law: the reciprocal relationship between community and sea-Country is being maintained.", "Dugong in clear, warm, shallow water: the ideal conditions for marine life are present."], "negativeOmens": ["Dugong absent from known seagrass beds: the marine ecosystem is degraded; water quality has declined, seagrass has died.", "Dugong stranding or death (especially from boat strike): human activity is killing the sea-ancestor.", "Seagrass meadow loss (the Dugong's sole food source): the foundation of the marine ecosystem is collapsing.", "Conflict over Dugong hunting rights: the oldest marine management system on Earth is being overridden by newer legal frameworks."], "contextualModifiers": ["Australia holds the world's largest Dugong population \u2014 this is a global stewardship responsibility.", "Torres Strait Dugong hunting is a legally protected Indigenous right and a constant source of cross-cultural tension.", "Seagrass = the key indicator. Healthy seagrass = Dugongs present. Degraded seagrass = Dugongs gone. The omen 4 a flightless, helmet-crested, dagger-clawed ratite standing nearly two metres tall, capable of killing a human with a single kick. In Rainforest Aboriginal traditions, it is an ancestral being of immense power associated with the deep rainforest and seasonal fruit cycles.", "semioticReasoning": "The Cassowary\u2019s semiotic power derives from categorical shock: it is a bird that does not behave like any bird in the European framework. It does not fly, does not sing melodically, is taller than most humans, and its inner toe bears a 12cm dagger-like claw. In Djabugay and other rainforest nations, the Cassowary distributes seeds of over 200 plant species \u2014 many of which ONLY germinate after passing through its gut. The Cassowary does not merely live in the rainforest; the rainforest exists because the Cassowary plants it.", "positiveOmens": ["Cassowary seen in dense rainforest: the forest\u2019s architect is present; the ecosystem is intact.", "Cassowary droppings full of seeds: the planting cycle continues; the forest is being renewed.", "Cassowary father with chicks (the male raises young alone): devoted nurturing; patience and protective ferocity combined.", "Hearing the Cassowary\u2019s deep booming call: the oldest voice in the rainforest is still speaking."], "negativeOmens": ["Cassowary on a road or in a suburban area: the forest has been fragmented.", "Cassowary charging or displaying aggression: you have entered a domain demanding more respect than you show.", "Cassowary struck by a vehicle: human speed destroying ancient slowness.", "Cassowary absent from known habitat: the architect has gone; the forest cannot regenerate without it.", "Cassowary attack: the most dangerous bird on Earth has enforced its boundary."], "contextualModifiers": ["The casque (helmet) is visually striking and functionally mysterious.", "Fruit season (November-March): encounters increase as they follow fruiting trees.", "Only ~4,600 remain in wild Australia. Every sighting is if(e.positiveOmens&&e.positiveOmens.length){h+='<div><h3 style="font-family:Uncial Antiqua,serif;font-size:15px;color:#7aaa5a;margin:0 0 10px 0;font-weight:400;letter-spacing:.5px">\u263D Positive Omens</h3>';e.positiveOmens.forEach(function(o){h+='<div class="op op-pos">'+esc(o)+'</div>'});h+='</div>';}
if(e.negativeOmens&&e.negativeOmens.length){h+='<div><h3 style="font-family:Uncial Antiqua,serif;font-size:15px;color:#c07a6a;margin:0 0 10px 0;font-weight:400;letter-spacing:.5px">\u263E Negative Omens</h3>';e.negativeOmens.forEach(function(o){h+='<div class="op op-neg">'+esc(o)+'</div>'});h+='</div>';}
if(e.contextualModifiers&&e.contextualModifiers.length){h+='<div><h3 style="font-family:Uncial Antiqua,serif;font-size:15px;color:#8a8ab0;margin:0 0 10px 0;font-weight:400;letter-spacing:.5px">\u25C8 Contextual Modifiers</h3>';e.contextualModifiers.forEach(function(o){h+='<div class="op op-mod">'+esc(o)+'</div>'});h+='</div>';}
h+='</div>';
}else if(tab==="semiotic"){
h+='<div class="prose stone-inset"><h3>Semiotic Reasoning</h3><p>'+esc(e.semioticReasoning||"No semiotic analysis available.")+'</p></div>';
}else if(tab==="context"){
h+='<div class="prose stone-inset"><h3>Cultural &amp; Folkloric Context</h3><p>'+esc(e.culturalContext||"No cultural context available.")+'</p></div>';
}else if(tab==="syncretic"){
h+='<h3 style="font-family:Uncial Antiqua,serif;font-size:17px;color:#a8c890;margin:0 0 14px 0;font-weight:400;letter-spacing:.5px">Cross-Cultural Connections</h3>';
if(e.syncreticLinks&&e.syncreticLinks.length){e.syncreticLinks.forEach(function(l){h+='<div class="lcard stone-inset"><h4>'+esc(l.culture)+'</h4><p>'+esc(l.note)+'</p></div>'});}
else h+='<p style="color:rgba(100,130,80,.4);font-style:italic">No syncretic links documented yet.</p>';
}
document.getElementById("tc").innerHTML=h;
};
